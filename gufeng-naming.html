<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!--V4-TEMPLATE--><title>Toobey 取名 — 古诗文提名</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;background:linear-gradient(135deg,#f0f5ff 0%,#e8f4fd 50%,#f5f0ff 100%);color:#4a5568;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:20px}
.header{text-align:center;padding:28px 0;margin-bottom:16px}
.header h1{font-size:28px;color:#5b7faa;font-weight:600;letter-spacing:4px;margin-bottom:4px}
.header p{color:#8aa3b8;font-size:13px;letter-spacing:1px}
.lit-badge{background:rgba(91,127,170,0.1);color:#5b7faa;padding:3px 12px;border-radius:20px;font-size:12px;border:1px solid rgba(91,127,170,0.2)}
.card{background:rgba(255,255,255,0.75);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.5);border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 2px 12px rgba(91,127,170,0.08)}
.form-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-group{display:flex;flex-direction:column}
.form-group label{font-size:11px;color:#8aa3b8;margin-bottom:2px;letter-spacing:1px}
.form-group input,.form-group select{background:rgba(255,255,255,0.6);border:1px solid rgba(91,127,170,0.15);border-radius:10px;padding:9px 12px;color:#4a5568;font-size:14px;outline:none;font-family:inherit;transition:border-color .3s,box-shadow .3s}
.form-group input:focus,.form-group select:focus{border-color:#7eb8d0;box-shadow:0 0 0 3px rgba(126,184,208,0.15)}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#7eb8d0,#a8d5e2);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;margin-top:12px;letter-spacing:2px;font-family:inherit;transition:all .3s;box-shadow:0 2px 8px rgba(126,184,208,0.3)}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(126,184,208,0.4)}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.loading{display:none;text-align:center;padding:30px;color:#8aa3b8}
.loading.active{display:block}
.spinner{width:36px;height:36px;border:3px solid rgba(126,184,208,0.2);border-top-color:#7eb8d0;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.name-card{background:linear-gradient(135deg,#f5f0e0,#efe8d0);border:1px solid rgba(180,160,120,0.3);border-radius:14px;padding:20px 16px;cursor:pointer;transition:all .3s;box-shadow:0 2px 8px rgba(140,120,80,0.08);width:100%;aspect-ratio:3/4;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:8px}
.name-card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(140,120,80,0.15);border-color:rgba(180,160,120,0.5)}
.name-header{display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px}
.name-text{font-size:28px;font-weight:400;letter-spacing:6px;color:#5a4a3a;font-family:'ZCOOL XiaoWei','Ma Shan Zheng',KaiTi,STKaiti,cursive;line-height:1.3;text-shadow:0 0 8px rgba(255,255,240,0.4),0 0 4px rgba(255,255,240,0.3)}
.score-badge{background:linear-gradient(135deg,#b8a080,#a08860);padding:3px 12px;border-radius:20px;font-size:13px;font-weight:500;color:#f5f0e0;display:inline-block}
.name-source{font-size:11px;color:#8a7a5a;margin-top:4px;padding:3px 8px;background:rgba(140,120,80,0.12);border-radius:8px;display:inline-block;font-weight:500;text-align:center}
#namesList{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.name-detail.open{display:block;animation:fadeIn .3s ease;grid-column:1/-1}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.poem-line{padding:10px 12px;margin:8px 0;background:linear-gradient(135deg,#1e2a3a,#2a1f3a);border-radius:10px;border-left:3px solid #a78bfa;color:#e8e0d0;font-size:13px;line-height:1.8}
.score-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.score-item{font-size:11px;color:#c0b8a8;background:rgba(167,139,250,0.12);padding:2px 10px;border-radius:20px;font-weight:500}
.highlight{color:#a78bfa;font-weight:600}
.close-btn{position:absolute;top:12px;right:16px;background:none;border:none;color:#8888aa;font-size:28px;cursor:pointer;line-height:1;padding:2px 10px;border-radius:6px;transition:.2s}
.close-btn:hover{background:rgba(255,255,255,0.1);color:#fff}
.stat-bar{margin-top:12px;font-size:13px;color:#8aa3b8}
.bazi-section{display:none;margin-bottom:16px;animation:fadeIn .3s ease}
.bazi-section.active{display:block}
.pillars{display:flex;gap:10px;margin:10px 0;flex-wrap:wrap}
.pillar{background:rgba(126,184,208,0.08);padding:8px 14px;border-radius:10px;border:1px solid rgba(126,184,208,0.15);text-align:center}
.pillar-name{font-size:10px;color:#8aa3b8}
.pillar-text{font-size:18px;font-weight:600;letter-spacing:2px;color:#3d5a80}
.wx-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:13px}
.wx-bar{flex:1;height:6px;background:rgba(91,127,170,0.1);border-radius:3px;overflow:hidden}
.wx-fill{height:100%;border-radius:3px}
.wx-rec{background:rgba(126,184,208,0.08);border:1px solid rgba(126,184,208,0.2);padding:8px 14px;border-radius:10px;margin-top:10px;font-size:13px;color:#5b7faa}
@media(max-width:600px){#namesList{grid-template-columns:repeat(2,1fr)}.form-row{grid-template-columns:1fr 1fr}.name-text{font-size:18px}}
</style>
</head>
<body>
<div class="container">
<div class="header">
    <h1 style="font-size:34px;letter-spacing:6px;margin-bottom:8px"><span style="font-family:'Ma Shan Zheng','ZCOOL KuaiLe',KaiTi,cursive;color:#8b1a1a;font-weight:400">古风取名</span><span style="color:#7eb8d0;font-size:18px;font-family:'PingFang SC',sans-serif;font-weight:300;letter-spacing:2px">-Toobey</span></h1>
        <p>古韵典籍· 八字五行 · 六大维度 · 精选好名<span id="litCount" style="display:none">${res.lit_db_size||0}篇</span></p>
</div>

<div class="card">
    <div class="form-row">
        <div class="form-group"><label>姓氏</label><input type="text" id="surname" placeholder="张" maxlength="2"></div>
        <div class="form-group"><label>性别</label><select id="gender"><option value="male">男孩</option><option value="female">女孩</option></select></div>
        <div class="form-group"><label>时辰</label><select id="hour"><option value="">未知</option><option value="23">子时(23-01)</option><option value="1">丑时(01-03)</option><option value="3">寅时(03-05)</option><option value="5">卯时(05-07)</option><option value="7">辰时(07-09)</option><option value="9">巳时(09-11)</option><option value="11" selected>午时(11-13)</option><option value="13">未时(13-15)</option><option value="15">申时(15-17)</option><option value="17">酉时(17-19)</option><option value="19">戌时(19-21)</option><option value="21">亥时(21-23)</option></select></div>
        <div class="form-group"><label>数量</label><select id="count"><option value="10">10个</option><option value="20" selected>20个</option><option value="30">30个</option></select></div>
    </div>
    <div class="form-row-2">
        <div class="form-group"><label>出生年份</label><select id="year"></select></div>
        <div class="form-row" style="grid-template-columns:1fr 1fr;gap:10px;margin:0">
            <div class="form-group"><label>月</label><select id="month"></select></div>
            <div class="form-group"><label>日</label><select id="day"></select></div>
        </div>
    </div>
    <div class="form-row-2">
        <div class="form-group"><label>固定字（选填）</label><input type="text" id="fixedChar" placeholder="如：云" maxlength="1"></div>
        <div class="form-group"><label>位置</label><select id="fixedPos"><option value="">不限</option><option value="middle">中间字</option><option value="last">末尾字</option></select></div>
    </div>
    <button class="btn" id="btnGen" onclick="generate()">📜 开始取名</button>
</div>

<div class="loading" id="loading"><div class="spinner"></div>翻阅古籍，为您选名...</div>
<div class="bazi-section" id="baziSection"></div>
<div id="namesList"></div>
</div>

<script>
// 日期初始化
(function(){
    const y=document.getElementById('year');
    for(let yy=2099;yy>=1970;yy--){const o=document.createElement('option');o.value=yy;o.textContent=yy+'年';if(yy===2026)o.selected=true;y.appendChild(o)}
    const m=document.getElementById('month');
    for(let mm=1;mm<=12;mm++){const o=document.createElement('option');o.value=mm;o.textContent=mm+'月';if(mm===7)m.selectedIndex=mm-1;m.appendChild(o)}
    updateDays();
    document.getElementById('month').onchange=updateDays;
    document.getElementById('year').onchange=updateDays;
})();
function updateDays(){
    const y=+document.getElementById('year').value,m=+document.getElementById('month').value;
    const d=document.getElementById('day'),days=new Date(y,m,0).getDate();
    d.innerHTML='';
    for(let dd=1;dd<=days;dd++){const o=document.createElement('option');o.value=dd;o.textContent=dd+'日';if(dd===15)o.selected=true;d.appendChild(o)}
}
function generate(){
    const s=document.getElementById('surname').value.trim();
    if(!s){alert('请填写姓氏');return}
    document.getElementById('btnGen').disabled=true;document.getElementById('btnGen').textContent='⏳ 翻阅古籍中...';
    document.getElementById('loading').classList.add('active');
    document.getElementById('baziSection').classList.remove('active');
    document.getElementById('namesList').innerHTML='';
    
    fetch('/generate',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            surname:s,gender:document.getElementById('gender').value,
            year:+document.getElementById('year').value,
            month:+document.getElementById('month').value,
            day:+document.getElementById('day').value,
            hour:+document.getElementById('hour').value||12,
            count:+document.getElementById('count').value,
            fixed_char:document.getElementById('fixedChar').value.trim(),
            fixed_pos:document.getElementById('fixedPos').value
        })
    }).then(r=>r.json()).then(res=>{
        document.getElementById('btnGen').disabled=false;document.getElementById('btnGen').textContent='📜 开始取名';
        document.getElementById('loading').classList.remove('active');
        if(!res.success){alert(res.error||'失败');return}
        
        document.getElementById('litCount').textContent=`${res.lit_db_size||0}篇`;
        
        // 八字
        const b=res.bazi,wx={'木':'#10b981','火':'#f59e0b','土':'#a78bfa','金':'#f472b6','水':'#3b82f6'},we={'木':'🌲','火':'🔥','土':'🏔️','金':'⚔️','水':'💧'};
        const mx=Math.max(...Object.values(b.wuxing_counts),1);
        let ph='';b.pillars.forEach(p=>{ph+=`<div class="pillar"><div class="pillar-name">${p.name}</div><div class="pillar-text">${p.text}</div></div>`});
        let wh='';
        ['木','火','土','金','水'].forEach(w=>{
            const v=b.wuxing_counts[w]||0,pct=(v/mx*100).toFixed(0);
            wh+=`<div class="wx-row"><span>${we[w]||''}</span><div class="wx-bar"><div class="wx-fill" style="width:${pct}%;background:${wx[w]}"></div></div><span>${v}</span></div>`;
        });
        document.getElementById('baziSection').innerHTML=`
            <div class="card"><div style="font-size:15px;font-weight:600;margin-bottom:10px">☯️ 八字参考</div>
            <div style="font-size:12px;color:#888">${b.birth_date} · ${b.gender} · 生肖${b.zodiac} · 八字${b.bazi_str} · 日主${b.ri_zhu}(${b.ri_zhu_wx})</div>
            <div class="pillars">${ph}</div>${wh}
            <div class="wx-rec">💡 ${b.recommend_text}</div></div>`;
        document.getElementById('baziSection').classList.add('active');
        
        // 名字
        const list=document.getElementById('namesList');list.innerHTML='';var card_idx=0;
        res.names.forEach(n=>{
            const phr=n.phrase_analysis||[];
            const card=document.createElement('div');card.className='name-card';
            card.onclick=function(){if(this.dataset.detail)openModal(this.dataset.name,this.dataset.detail)};card_idx++;
            const sourcesData = phr.map(p=>({title:p.title,source:p.source,snippet:p.snippet||''}));
            let sourceHtml='';
            if(sourcesData.length>0){
                sourceHtml=`<div class="name-source">📜 出自「${sourcesData[0].title}」${sourcesData[0].source}</div>`;
            }
            
            let detailHtml='';
            if(sourcesData.length>0){
                detailHtml+='<div style="margin-bottom:10px"><div style="font-weight:600;margin-bottom:6px;color:#a78bfa">📜 诗文出处与释义</div>';
                sourcesData.forEach((p,idx)=>{
                    const uid='fp_'+(Math.random()+Date.now()).toString(36).slice(2,10)+'_'+idx;
                    detailHtml+=`<div class="poem-line" style="margin-bottom:8px;padding:10px">
                        <div style="font-weight:600;color:#a78bfa;font-size:14px">「${p.title}」${p.source}</div>
                        <div style="margin:6px 0;color:#a78bfa;font-style:italic;padding:6px;background:rgba(0,0,0,0.15);border-radius:6px">${p.snippet}</div>
                        <div style="color:#8888aa;font-size:12px;margin-bottom:4px">📖 全诗：</div>
                        <div id="${uid}" data-title="${p.title}" data-snippet="${p.snippet||''}" style="color:#e8e8f0;font-size:13px;line-height:2;padding:6px;background:rgba(0,0,0,0.1);border-radius:6px;max-height:200px;overflow-y:auto">加载中...</div>
                        <div id="ex_${uid}" style="margin-top:6px;padding:6px;background:rgba(16,185,129,0.1);border-left:3px solid #10b981;border-radius:4px;color:#10b981;font-size:12px">💡 加载释义中...</div>
                    </div>`;
                    // 存标题到data属性，弹窗时触发加载
                    // 加载标记：id以fp_开头的内容会在openModal时自动拉取全诗
                });
                detailHtml+='</div>';
            }

                _dims.forEach(d=>{const bl=Math.floor(d[1]/d[2]*10);_bars+=d[0]+'：'+'█'.repeat(bl)+'░'.repeat(10-bl)+' '+d[1]+'/'+d[2]+'<br>'});
                const _lvl=n.total_score>=85?'🌟 绝佳好名':n.total_score>=75?'👍 上乘之名':'✅ 不错';
                detailHtml+=`<div style="margin:10px 0;padding:12px;background:#2a2a1e;border-radius:8px">
                    <div style="font-weight:600;margin-bottom:6px;color:#a78bfa">📊 综合评分 ${n.total_score} ${_lvl}</div>
                    <div style="font-size:13px;color:#b8b8d0;line-height:1.8">${_bars}</div></div>`;
            }            detailHtml+=`<div class="score-row">
                <span class="score-item ${n.bazi_score>=25?'highlight':''}">☯️五行 ${n.bazi_score}/35</span>
                <span class="score-item ${n.lit_score>=14?'highlight':''}">📜诗文 ${n.lit_score}/20</span>
                <span class="score-item">🔊音律 ${n.tone_score}/20</span>
                <span class="score-item">📖字义 ${n.meaning_score}/20</span>
                <span class="score-item">✍️字形 ${n.stroke_score}/15</span>
            </div>`;
            
            // 卡片只显示姓名+打分+出处
            card.innerHTML=`<div class="name-header"><span class="name-text">${n.name}</span><span class="score-badge">${n.total_score}</span></div>${sourceHtml}`;
            // 详情数据存到dataset，点击时弹出
            card.dataset.detail = detailHtml;
            card.dataset.name = n.name;
            list.appendChild(card);
        });
        list.scrollIntoView({behavior:'smooth',block:'start'});
    }).catch(e=>{
        document.getElementById('btnGen').disabled=false;document.getElementById('btnGen').textContent='📜 开始取名';
        document.getElementById('loading').classList.remove('active');
        alert('错误：'+e.message);
    });
}

function loadFullPoem(el, title){
    const div = el.parentElement.querySelector('.full-poem');
    if(div.style.display !== 'none'){div.style.display='none';return}
    if(div.innerHTML){div.style.display='block';return}
    div.innerHTML = '<span style="color:#888">加载中...</span>';
    div.style.display = 'block';
    fetch('/poem?title='+encodeURIComponent(title))
    .then(r=>r.json())
    .then(d=>{
        if(d.found){
            div.innerHTML = '<div style="font-weight:600;color:#a78bfa;margin-bottom:6px">📖 『'+d.title+'』'+d.source+'</div>'+
                '<div style="color:#e8e8f0;line-height:2">'+d.content+'</div>';
        }else{
            div.innerHTML = '<span style="color:#888">未找到全文</span>';
        }
    })
    .catch(()=>{div.innerHTML='<span style="color:#f44">加载失败</span>'});
}

</script>
<!-- 详情弹窗 -->
<div id="nameModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:1000;justify-content:center;align-items:center;animation:fadeIn .2s ease" onclick="if(event.target===this)closeModal()">
    <div style="background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:16px;max-width:680px;width:90%;max-height:85vh;display:flex;flex-direction:column;position:relative;box-shadow:0 8px 40px rgba(0,0,0,0.4);color:#e8e0d0">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:20px 20px 0 20px;flex-shrink:0">
            <div id="modalTitle" style="font-size:28px;font-weight:400;letter-spacing:8px;color:#e8e0d0;font-family:'ZCOOL XiaoWei','Ma Shan Zheng',KaiTi,STKaiti,cursive;text-align:center;flex:1"></div>
            <button onclick="closeModal()" style="background:none;border:none;color:#8888aa;font-size:28px;cursor:pointer;line-height:1;padding:0 8px;border-radius:4px;flex-shrink:0;transition:.2s" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#8888aa'">&times;</button>
        </div>
        <div id="modalBody" style="padding:16px 20px 20px 20px;overflow-y:auto;flex:1;min-height:0"></div>
    </div>
</div>
<script>
function openModal(name,html){
    document.getElementById('modalTitle').textContent=name;
    document.getElementById('modalBody').innerHTML=html;
    document.getElementById('nameModal').style.display='flex';
    document.body.style.overflow='hidden';
    // 自动拉取全诗
    setTimeout(function(){
        var fpes=document.getElementById('modalBody').querySelectorAll('[id^="fp_"]');
        fpes.forEach(function(el){
            if(el.textContent==='加载中...'){
                var title=el.dataset.title;
                if(title){
                    fetch('/poem?title='+encodeURIComponent(title))
                    .then(function(r){return r.json()}).then(function(d){
                        el.textContent=d.found?d.content:(el.dataset.snippet||'未找到全文');
                        var ex=document.getElementById('ex_'+el.id);
                        if(ex) ex.innerHTML='💡 名字取自「'+title+'」';
                    });
                }
            }
        });
    }, 100);
}
function closeModal(){document.getElementById('nameModal').style.display='none';document.body.style.overflow=''}
</script></script>
